meters:
  - name: site_subscription
    unit: month
    aggregation: sum
    dimensions:
      - plan_tier
      - billing_term
  - name: commerce_transactions
    unit: transaction
    aggregation: count
    dimensions:
      - plan_tier
      - currency
  - name: transaction_volume
    unit: USD
    aggregation: sum
    dimensions:
      - plan_tier
      - currency
principles:
  - name: Visibility
    description: Inspect billing in the Squarespace merchant account dashboard; commerce activity (orders, refunds, payouts) is queryable through the Transactions and Orders endpoints of the Commerce API for downstream cost-of-channel analysis.
  - name: Allocation
    description: For multi-brand operators, allocate per-site subscription cost to the brand that owns the Squarespace website. Tag transactions in the Orders API by storefront / channel to attribute take-rate spend.
  - name: Optimization
    description: Move to Commerce Advanced when transaction-fee savings on lower tiers exceed the subscription delta. Use the Inventory and Products APIs to keep a single source of truth and avoid duplicate-listing fees across channels.
  - name: Accountability
    description: E-commerce / merchant-ops team owns the Squarespace subscription and renewal; finance owns reconciliation of Squarespace payouts against the Transactions API export.
maintainers:
  - name: Squarespace, Inc.
    url: https://developers.squarespace.com/
