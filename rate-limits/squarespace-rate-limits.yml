specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Squarespace
providerId: squarespace
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Commerce
  - E-Commerce
  - Rate Limiting
description: Squarespace Commerce APIs enforce a global limit of 300 requests per minute (equivalent to 5 requests per second). The Create Order endpoint enforces a stricter cap of 100 requests per hour per website when authenticated with an API key; OAuth-authenticated callers are not subject to this Create Order cap. Exceeding a limit returns 429 Too Many Requests with a one-minute cooldown.
sources:
  - https://developers.squarespace.com/commerce-apis/rate-limits
  - https://developers.squarespace.com/commerce-apis/making-requests
notes: Squarespace's docs do not enumerate X-RateLimit-* response headers; the published contract is the 429 status code and the one-minute cooldown.
responseCodes:
  throttled: 429
limits:
  - name: Global Commerce API
    scope: website
    metric: requests_per_minute
    limit: 300
    timeFrame: minute
    notes: 300 requests per minute, equivalent to 5 requests per second. Applies across all Commerce API endpoints unless an endpoint declares a stricter cap.
  - name: Global Commerce API (per-second equivalent)
    scope: website
    metric: requests_per_second
    limit: 5
    timeFrame: second
    notes: Bandwidth equivalent of the 300/minute global limit.
  - name: Create Order Endpoint (API Key auth)
    scope: website/auth-method
    metric: requests_per_hour
    limit: 100
    timeFrame: hour
    notes: Stricter limit specific to the Create Order endpoint when called with API Key authentication. Does not apply to OAuth-authenticated requests.
policies:
  - name: 429 Cooldown
    description: After exceeding the rate limit, the API returns 429 Too Many Requests and enters a one-minute cooldown before serving further calls. Clients should pause for at least 60 seconds before retrying.
  - name: OAuth vs API Key
    description: OAuth authentication is required to bypass the 100-per-hour Create Order cap. API key auth is the default but carries the stricter Create Order limit.
  - name: Customer Care for Edge Cases
    description: Squarespace directs operators to Customer Care for guidance on rate-limiting strategies beyond the published thresholds.
maintainers:
  - name: Squarespace, Inc.
    url: https://developers.squarespace.com/
