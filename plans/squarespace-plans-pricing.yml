description: Squarespace's Commerce API is not sold separately - access is bundled with the merchant's Squarespace site subscription. Squarespace's website / commerce plan tiers (Personal, Business, Commerce Basic, Commerce Advanced) are rendered behind a JavaScript-driven pricing page that is not publicly scrapeable, and the developer-portal overview does not enumerate per-tier prices or API entitlements. Treat this artifact as a Contact Sales placeholder until the merchant-plan price table can be reconciled directly from squarespace.com/pricing.
sources:
  - https://developers.squarespace.com/commerce-apis/overview
  - https://www.squarespace.com/pricing
notes: API access is bundled with the merchant Squarespace site subscription, not priced separately. Concrete monthly prices for Personal / Business / Commerce Basic / Commerce Advanced are gated behind a JS-rendered pricing page and were not reconcilable in this pass.
plans:
  - id: squarespace-contact-sales
    name: Contact Sales
    type: subscription
    description: Commerce API access is included with the merchant Squarespace subscription. Per-plan website / commerce pricing should be confirmed at squarespace.com/pricing; transaction take-rates apply on top of the subscription depending on tier (Squarespace's Commerce Advanced removes the additional transaction fee charged on lower tiers).
    entries:
      - label: Squarespace Site Subscription
        name: site_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.squarespace.com/pricing
        userMultiplied: false
      - label: Commerce API Access
        name: commerce_api
        type: flat
        metric: api
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included with site subscription
        userMultiplied: false
    elements:
      - name: Commerce API (Products, Orders, Inventory, Transactions, Profiles)
      - name: Webhook Subscriptions
      - name: API Key and OAuth Authentication
      - name: Bundled with Squarespace Merchant Subscription
maintainers:
  - name: Squarespace, Inc.
    url: https://developers.squarespace.com/
