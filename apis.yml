aid: squarespace
url: https://raw.githubusercontent.com/api-evangelist/squarespace/refs/heads/main/apis.yml
apis:
  - aid: squarespace:commerce-api
    name: Squarespace Commerce API
    tags:
      - Commerce
      - E-Commerce
      - Website Builder
      - Retail
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/overview
        type: Documentation
      - url: openapi/squarespace-commerce-api-openapi.yml
        type: OpenAPI
    description: >-
      The Squarespace Commerce API provides programmatic access to the commerce
      features of a Squarespace merchant site. It enables developers to build
      integrations and applications that manage products, process orders, track
      inventory, access customer profiles, retrieve financial transactions, and
      configure webhook subscriptions. All endpoints use HTTPS and follow REST
      principles with standard verbs and response status codes. Authentication
      is handled via API keys or OAuth tokens, allowing both personal and
      third-party application access to merchant data.

  - aid: squarespace:orders-api
    name: Squarespace Orders API
    tags:
      - Orders
      - Commerce
      - E-Commerce
      - Fulfillment
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/orders-overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/orders-overview
        type: Documentation
      - url: openapi/squarespace-orders-api-openapi.yml
        type: OpenAPI
    description: >-
      The Squarespace Orders API provides access to order history for a
      Squarespace merchant site, supporting both one-time purchases and
      subscription orders. Developers can retrieve, create, and manage orders,
      as well as import orders from third-party sales channels into Squarespace.
      The API supports filtering and pagination for retrieving large sets of
      orders. It is commonly used to synchronize order data with external
      fulfillment systems, ERPs, or custom reporting tools.

  - aid: squarespace:inventory-api
    name: Squarespace Inventory API
    tags:
      - Inventory
      - Commerce
      - Stock Management
      - E-Commerce
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/inventory-overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/inventory-overview
        type: Documentation
      - url: openapi/squarespace-inventory-api-openapi.yml
        type: OpenAPI
    description: >-
      The Squarespace Inventory API enables reading and adjusting stock
      information for product variants on a Squarespace merchant site. Developers
      can retrieve current inventory levels and apply incremental adjustments to
      stock quantities. This API is useful for integrating Squarespace with
      warehouse management systems, point-of-sale systems, or multi-channel
      inventory management platforms. Inventory adjustments can be applied in
      bulk across multiple product variants.

  - aid: squarespace:products-api
    name: Squarespace Products API
    tags:
      - Products
      - Commerce
      - Catalog
      - E-Commerce
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/products-overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/products-overview
        type: Documentation
      - url: openapi/squarespace-products-api-openapi.yml
        type: OpenAPI
    description: >-
      The Squarespace Products API allows developers to manage the product
      catalog of a Squarespace merchant site. It supports physical products,
      service products, gift cards, and digital downloads, along with their
      images and variants. Developers can create, update, retrieve, and delete
      products programmatically, enabling catalog synchronization with external
      systems. The API is well-suited for building product import tools,
      headless commerce integrations, or multi-channel retail management
      applications.

  - aid: squarespace:profiles-api
    name: Squarespace Profiles API
    tags:
      - Profiles
      - Customers
      - Commerce
      - CRM
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/profiles-overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/profiles-overview
        type: Documentation
      - url: openapi/squarespace-profiles-api-openapi.yml
        type: OpenAPI
    description: >-
      The Squarespace Profiles API provides access to Profile resource objects,
      representing customers, mailing list subscribers, and donors associated
      with a Squarespace site. Each profile includes contact information, an
      approximate address derived from existing data, and a summary of the
      user's commerce activity such as orders and donations. This API is useful
      for CRM integrations, email marketing platforms, and customer analytics
      tools. Profile data is generated asynchronously from site activity and
      accessible through the standard Profiles panel.

  - aid: squarespace:transactions-api
    name: Squarespace Transactions API
    tags:
      - Transactions
      - Payments
      - Finance
      - Commerce
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/transactions-overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/transactions-overview
        type: Documentation
      - url: openapi/squarespace-transactions-api-openapi.yml
        type: OpenAPI
    description: >-
      The Squarespace Transactions API returns Document resource objects
      representing collections of financial transactions for orders and
      donations on a merchant site. It provides detailed payment data and
      supports multiple payment gateways including Squarespace Payments, Stripe,
      PayPal, and Square. The API is useful for building financial reporting
      tools, reconciliation workflows, and accounting integrations. Access to
      the Transactions API requires a Commerce Basic, Commerce Advanced, or
      higher Squarespace plan.

  - aid: squarespace:webhook-subscriptions-api
    name: Squarespace Webhook Subscriptions API
    tags:
      - Webhooks
      - Events
      - Commerce
      - Notifications
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/commerce-apis/webhook-subscriptions-overview
    properties:
      - url: https://developers.squarespace.com/commerce-apis/webhook-subscriptions-overview
        type: Documentation
      - url: openapi/squarespace-webhook-subscriptions-api-openapi.yml
        type: OpenAPI
      - url: asyncapi/squarespace-webhooks-asyncapi.yml
        type: AsyncAPI
    description: >-
      The Squarespace Webhook Subscriptions API allows developers to subscribe
      to event notifications from a Squarespace site. Supported event topics
      include order creation, order updates, and extension uninstalls, enabling
      real-time integrations with external systems. The API supports creating,
      updating, retrieving, and deleting webhook subscriptions, as well as
      sending test notifications and rotating subscription secrets. All webhook
      subscription requests require OAuth token authentication.

  - aid: squarespace:developer-platform
    name: Squarespace Developer Platform
    tags:
      - Templates
      - Developer Tools
      - Custom Code
      - Website Builder
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/
    properties:
      - url: https://developers.squarespace.com/
        type: Documentation
    description: >-
      The Squarespace Developer Platform provides tools for web developers to
      access, customize, and build upon the template files underlying Squarespace
      websites. Using Developer Mode, developers can access the template
      repository via Git, edit HTML, CSS, JavaScript, and JSON Template markup,
      and create fully custom Squarespace-hosted templates. The platform includes
      a local development server for testing changes before pushing them live.
      It is designed for advanced use cases where standard Squarespace
      customization options are insufficient, such as bespoke client sites or
      agency-built templates.

  - aid: squarespace:oauth
    name: Squarespace OAuth
    tags:
      - OAuth
      - Authentication
      - Authorization
      - Security
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.squarespace.com
    humanURL: https://developers.squarespace.com/oauth
    properties:
      - url: https://developers.squarespace.com/oauth
        type: Documentation
    description: >-
      Squarespace OAuth 2.0 enables third-party applications to obtain
      authorized access to Squarespace merchant sites on behalf of site owners.
      Developers register their applications in the Squarespace Developer
      portal, then implement the standard OAuth authorization code flow to
      request scoped access tokens. These tokens are used to authenticate
      requests to all Squarespace Commerce APIs. OAuth is required for building
      Squarespace Extensions and other integrations that access multiple
      merchant accounts.

common:
  - url: json-ld/squarespace-context.jsonld
    type: JSON-LD
  - url: json-schema/squarespace-order-schema.json
    type: JSONSchema
  - url: json-schema/squarespace-product-schema.json
    type: JSONSchema
  - url: json-schema/squarespace-webhook-notification-schema.json
    type: JSONSchema
