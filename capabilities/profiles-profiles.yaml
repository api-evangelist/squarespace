naftiko: 1.0.0-alpha2
info:
  label: Squarespace Profiles API — Profiles
  description: 'Squarespace Profiles API — Profiles. 2 operations. Lead operation: Retrieve All Profiles. Self-contained Naftiko
    capability covering one Squarespace business surface.'
  tags:
  - Squarespace
  - Profiles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SQUARESPACE_API_KEY: SQUARESPACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: profiles-profiles
    baseUri: https://api.squarespace.com/1.0
    description: Squarespace Profiles API — Profiles business capability. Self-contained, no shared references.
    resources:
    - name: profiles
      path: /profiles
      operations:
      - name: listprofiles
        method: GET
        description: Retrieve All Profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: isCustomer
          in: query
          type: boolean
          description: When true, filters results to only include customer profiles
        - name: hasAccount
          in: query
          type: boolean
          description: When true, filters to profiles associated with a Squarespace account. When false, filters to anonymous
            profiles.
        - name: email
          in: query
          type: string
          description: Filter profiles by exact email address match
    - name: profiles-profileIds
      path: /profiles/{profileIds}
      operations:
      - name: getprofiles
        method: GET
        description: Retrieve Specific Profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SQUARESPACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: profiles-profiles-rest
    port: 8080
    description: REST adapter for Squarespace Profiles API — Profiles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/profiles
      name: profiles
      description: REST surface for profiles.
      operations:
      - method: GET
        name: listprofiles
        description: Retrieve All Profiles
        call: profiles-profiles.listprofiles
        with:
          isCustomer: rest.isCustomer
          hasAccount: rest.hasAccount
          email: rest.email
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/profiles/{profileids}
      name: profiles-profileids
      description: REST surface for profiles-profileIds.
      operations:
      - method: GET
        name: getprofiles
        description: Retrieve Specific Profiles
        call: profiles-profiles.getprofiles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: profiles-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Squarespace Profiles API — Profiles. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-all-profiles
      description: Retrieve All Profiles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: profiles-profiles.listprofiles
      with:
        isCustomer: tools.isCustomer
        hasAccount: tools.hasAccount
        email: tools.email
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-specific-profiles
      description: Retrieve Specific Profiles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: profiles-profiles.getprofiles
      outputParameters:
      - type: object
        mapping: $.
