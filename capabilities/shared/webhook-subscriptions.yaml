naftiko: "1.0.0-alpha1"

info:
  label: "Squarespace Webhook Subscriptions API"
  description: >-
    Squarespace Webhook Subscriptions API for managing real-time event notification
    subscriptions including order events and extension uninstalls.
  tags:
    - Event Notifications
    - Squarespace
    - Webhooks
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SQUARESPACE_API_KEY: SQUARESPACE_API_KEY

capability:
  consumes:
    - type: http
      namespace: squarespace-webhooks
      baseUri: https://api.squarespace.com/1.0
      description: "Squarespace Webhook Subscriptions REST API"
      authentication:
        type: bearer
        token: "{{SQUARESPACE_API_KEY}}"
      resources:
        - name: webhook-subscriptions
          path: /webhook_subscriptions
          description: "Webhook subscription management"
          operations:
            - name: list-webhook-subscriptions
              method: GET
              description: "List all webhook subscriptions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook-subscription
              method: POST
              description: "Create a new webhook subscription"
              body:
                type: json
                data:
                  endpointUrl: "{{tools.endpointUrl}}"
                  topics: "{{tools.topics}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: webhook-subscription-by-id
          path: /webhook_subscriptions/{subscriptionId}
          description: "Individual webhook subscription management"
          operations:
            - name: get-webhook-subscription
              method: GET
              description: "Retrieve a specific webhook subscription"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Webhook subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-webhook-subscription
              method: PUT
              description: "Update a webhook subscription endpoint or topics"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Webhook subscription ID"
              body:
                type: json
                data:
                  endpointUrl: "{{tools.endpointUrl}}"
                  topics: "{{tools.topics}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-webhook-subscription
              method: DELETE
              description: "Delete a webhook subscription"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Webhook subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8106
      namespace: squarespace-webhooks-rest
      resources:
        - path: /v1/webhook-subscriptions
          name: webhook-subscriptions
          description: "Webhook subscription management"
          operations:
            - method: GET
              name: list-webhook-subscriptions
              description: "List all webhook subscriptions"
              call: "squarespace-webhooks.list-webhook-subscriptions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9106
      namespace: squarespace-webhooks-mcp
      transport: http
      tools:
        - name: list-webhook-subscriptions
          description: "List all Squarespace webhook subscriptions"
          hints:
            readOnly: true
            idempotent: true
          call: "squarespace-webhooks.list-webhook-subscriptions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-webhook-subscription
          description: "Create a new webhook subscription for Squarespace events"
          hints:
            readOnly: false
            idempotent: false
          call: "squarespace-webhooks.create-webhook-subscription"
          with:
            endpointUrl: "tools.endpointUrl"
            topics: "tools.topics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-webhook-subscription
          description: "Delete a Squarespace webhook subscription"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "squarespace-webhooks.delete-webhook-subscription"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
