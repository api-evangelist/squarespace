naftiko: "1.0.0-alpha1"

info:
  label: "Squarespace Orders API"
  description: >-
    Squarespace Orders API for accessing and managing order history including
    one-time purchases, subscription orders, and third-party channel imports.
  tags:
    - Commerce
    - E-Commerce
    - Orders
    - Squarespace
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SQUARESPACE_API_KEY: SQUARESPACE_API_KEY

capability:
  consumes:
    - type: http
      namespace: squarespace-orders
      baseUri: https://api.squarespace.com/1.0
      description: "Squarespace Orders REST API"
      authentication:
        type: bearer
        token: "{{SQUARESPACE_API_KEY}}"
      resources:
        - name: orders
          path: /commerce/orders
          description: "Order management"
          operations:
            - name: list-orders
              method: GET
              description: "Retrieve paginated list of orders"
              inputParameters:
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: modifiedAfter
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date filter"
                - name: modifiedBefore
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date filter"
                - name: fulfillmentStatus
                  in: query
                  type: string
                  required: false
                  description: "Filter by fulfillment status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-order
              method: POST
              description: "Create a new order or import from third-party channel"
              body:
                type: json
                data:
                  channelName: "{{tools.channelName}}"
                  externalOrderReference: "{{tools.externalOrderReference}}"
                  lineItems: "{{tools.lineItems}}"
                  customerEmail: "{{tools.customerEmail}}"
                  fulfillmentStatus: "{{tools.fulfillmentStatus}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: order-by-id
          path: /commerce/orders/{orderId}
          description: "Individual order retrieval"
          operations:
            - name: get-order
              method: GET
              description: "Retrieve a specific order by ID"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: squarespace-orders-rest
      resources:
        - path: /v1/orders
          name: orders
          description: "Order list and creation"
          operations:
            - method: GET
              name: list-orders
              description: "List all orders"
              call: "squarespace-orders.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders/{id}
          name: order
          description: "Individual order"
          operations:
            - method: GET
              name: get-order
              description: "Get a specific order"
              call: "squarespace-orders.get-order"
              with:
                orderId: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: squarespace-orders-mcp
      transport: http
      tools:
        - name: list-orders
          description: "Retrieve paginated orders from Squarespace merchant site"
          hints:
            readOnly: true
            idempotent: true
          call: "squarespace-orders.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-order
          description: "Retrieve a specific order by its ID"
          hints:
            readOnly: true
            idempotent: true
          call: "squarespace-orders.get-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
