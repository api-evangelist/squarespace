naftiko: "1.0.0-alpha1"

info:
  label: "Squarespace Inventory API"
  description: >-
    Squarespace Inventory API for reading and adjusting stock levels for product
    variants. Supports bulk inventory queries and individual variant stock management.
  tags:
    - Commerce
    - Inventory
    - Squarespace
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SQUARESPACE_API_KEY: SQUARESPACE_API_KEY

capability:
  consumes:
    - type: http
      namespace: squarespace-inventory
      baseUri: https://api.squarespace.com/1.0
      description: "Squarespace Inventory REST API"
      authentication:
        type: bearer
        token: "{{SQUARESPACE_API_KEY}}"
      resources:
        - name: inventory
          path: /commerce/inventory
          description: "Inventory level retrieval"
          operations:
            - name: list-inventory
              method: GET
              description: "Retrieve stock information for all product variants"
              inputParameters:
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: inventory-by-variant
          path: /commerce/inventory/{variantId}
          description: "Individual variant inventory"
          operations:
            - name: get-variant-inventory
              method: GET
              description: "Get inventory for a specific variant"
              inputParameters:
                - name: variantId
                  in: path
                  type: string
                  required: true
                  description: "Variant ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: inventory-adjustments
          path: /commerce/inventory/adjustments
          description: "Bulk inventory adjustment"
          operations:
            - name: adjust-inventory
              method: POST
              description: "Apply incremental stock adjustments to variants"
              body:
                type: json
                data:
                  inventory: "{{tools.inventory}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: squarespace-inventory-rest
      resources:
        - path: /v1/inventory
          name: inventory
          description: "Inventory levels"
          operations:
            - method: GET
              name: list-inventory
              description: "List all inventory"
              call: "squarespace-inventory.list-inventory"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: squarespace-inventory-mcp
      transport: http
      tools:
        - name: list-inventory
          description: "Retrieve current inventory levels for all product variants"
          hints:
            readOnly: true
            idempotent: true
          call: "squarespace-inventory.list-inventory"
          outputParameters:
            - type: object
              mapping: "$."
        - name: adjust-inventory
          description: "Apply stock quantity adjustments to product variants"
          hints:
            readOnly: false
            idempotent: false
          call: "squarespace-inventory.adjust-inventory"
          with:
            inventory: "tools.inventory"
          outputParameters:
            - type: object
              mapping: "$."
