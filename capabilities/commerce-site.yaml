naftiko: 1.0.0-alpha2
info:
  label: Squarespace Commerce API — Site
  description: 'Squarespace Commerce API — Site. 1 operations. Lead operation: Retrieve Basic Site Information. Self-contained
    Naftiko capability covering one Squarespace business surface.'
  tags:
  - Squarespace
  - Site
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SQUARESPACE_API_KEY: SQUARESPACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: commerce-site
    baseUri: https://api.squarespace.com/1.0
    description: Squarespace Commerce API — Site business capability. Self-contained, no shared references.
    resources:
    - name: authorization-website
      path: /authorization/website
      operations:
      - name: retrievesiteinfo
        method: GET
        description: Retrieve Basic Site Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SQUARESPACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: commerce-site-rest
    port: 8080
    description: REST adapter for Squarespace Commerce API — Site. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/authorization/website
      name: authorization-website
      description: REST surface for authorization-website.
      operations:
      - method: GET
        name: retrievesiteinfo
        description: Retrieve Basic Site Information
        call: commerce-site.retrievesiteinfo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-site-mcp
    port: 9090
    transport: http
    description: MCP adapter for Squarespace Commerce API — Site. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: retrieve-basic-site-information
      description: Retrieve Basic Site Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-site.retrievesiteinfo
      outputParameters:
      - type: object
        mapping: $.
